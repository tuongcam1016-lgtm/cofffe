name = "taynguyensoul-clone"
compatibility_date = "2026-05-16"
main = "public/_worker.js"

[assets]
directory = "./public"
binding = "ASSETS"

# Cloudflare must bind a KV namespace with this exact variable name.
# In Dashboard: Workers & Pages > cofffe > Bindings > Add binding > KV namespace
# Variable name: ORDERS_KV
# KV namespace: ORDERS_KV
#
# If deploying with Wrangler instead of Dashboard, uncomment and replace the id:
# [[kv_namespaces]]
# binding = "ORDERS_KV"
# id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"
